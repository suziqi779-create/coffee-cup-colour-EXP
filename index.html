<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Cup Colour EXP</title>
    <style>
        :root {
            --primary-color: #f1f1f1;
            --bg-dark: #101010;
            --accent-blue: #3F85FA;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* 防止全屏滚动 */
        }

        /* 场景容器：全屏铺满 */
        .scene-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* 图层样式 */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            will-change: opacity;
        }

        .layer-high-sat {
            background-image: url('high.jpg');
            z-index: 1;
        }

        .layer-low-sat {
            background-image: url('low.jpg');
            z-index: 2;
        }

        /* 悬浮控制面板：位于左下方 */
        .controls-panel {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 10;
            width: 300px; /* 调整了宽度，使其更精简 */
            background: rgba(0, 0, 0, 0.6); /* 加深半透明背景以突出显示 */
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(15px);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            color: #fff;
            font-size: 14px;
        }

        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
            accent-color: var(--accent-blue);
            height: 4px;
        }

        .value-display {
            font-family: monospace;
            min-width: 45px;
            text-align: right;
            font-size: 1.1em;
            color: #fff;
            font-weight: bold;
        }

        /* 提交按钮 */
        #submitBtn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: var(--accent-blue);
            color: white;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        #submitBtn:hover {
            background: #2b73e6;
        }

        #submitBtn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        /* 成功提示 */
        #successToast {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 204, 0.9);
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="successToast">The data has been updated. Please continue with the test.</div>

    <div class="scene-container">
        <div class="layer layer-high-sat"></div>
        <div class="layer layer-low-sat" id="lowSatLayer"></div>
    </div>

    <div class="controls-panel">
        <div class="slider-container">
            <span>Low</span>
            <input type="range" id="saturationSlider" min="0" max="100" value="50">
            <span>High</span>
            <span class="value-display"><span id="satValue">50</span>%</span>
        </div>

        <button id="submitBtn">Confirm selection</button>
    </div>

    <script>
        const lowSatLayer = document.getElementById('lowSatLayer');
        const saturationSlider = document.getElementById('saturationSlider');
        const satValueDisplay = document.getElementById('satValue');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('successToast');

        // 初始化透明度
        lowSatLayer.style.opacity = 0.5;

        // 监听滑块
        saturationSlider.addEventListener('input', (e) => {
            const saturationPercent = e.target.value; 
            // 饱和度越高，低饱和图层越透明
            const opacityValue = 1 - (saturationPercent / 100);
            lowSatLayer.style.opacity = opacityValue;
            satValueDisplay.textContent = saturationPercent;
        });

        // 提交逻辑
        submitBtn.onclick = function() {
            const saturationVal = (saturationSlider.value / 100).toFixed(3);
            
            // 发送数据给 Credamo
            if (window.parent) {
                window.parent.postMessage({
                    type: 'saturation_update',
                    saturation: saturationVal
                }, "*");
            }

            // UI 反馈
            toast.style.display = "block";
            submitBtn.innerText = "Selected";
            submitBtn.disabled = true;
            saturationSlider.disabled = true; 
            
            setTimeout(() => { 
                toast.style.display = "none"; 
            }, 3000);
        };
    </script>
</body>
</html>
