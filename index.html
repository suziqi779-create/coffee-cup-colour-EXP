<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咖啡馆饱和度实验程序</title>
    <style>
        :root {
            --primary-color: #d4a373;
            --bg-dark: #121212;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 实验容器：锁定比例防止位移 */
        .experiment-container {
            position: relative;
            width: 90vw;
            max-width: 1000px;
            /* 关键：利用图片自然撑开高度，确保两者重叠 */
            line-height: 0; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
        }

        /* 基础图层样式 */
        .layer {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 背景图层 */
        .background-layer {
            z-index: 1;
        }

        /* 咖啡杯图层：绝对定位在左上角，重叠在背景上 */
        .cup-layer {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            /* 初始饱和度 */
            filter: saturate(100%);
            /* 防止用户误拖拽杯子图片 */
            user-select: none;
            -webkit-user-drag: none;
        }

        /* 控制面板 */
        .controls {
            margin-top: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 80%;
            max-width: 500px;
        }

        .label-text {
            font-size: 1.1em;
            margin-bottom: 20px;
            display: block;
            letter-spacing: 1px;
        }

        /* 滑动条样式自定义 */
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .value-display {
            margin-top: 15px;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.3em;
        }
    </style>
</head>
<body>

    <div class="experiment-container">
        <img src="Cafe_Me.png" class="layer background-layer" alt="Cafe Interior">
        <img src="Cup_Me.png" id="targetCup" class="layer cup-layer" alt="Coffee Cup">
    </div>

    <div class="controls">
        <label class="label-text">Please use the slider to adjust the saturation to your preferrence while enjoying ME-TIME</label>
        <input type="range" id="satSlider" min="0" max="250" value="100">
        <div class="value-display">Saturation: <span id="valLabel">100</span>%</div>
    </div>

    <script>
        const slider = document.getElementById('satSlider');
        const cup = document.getElementById('targetCup');
        const label = document.getElementById('valLabel');

        // 监听滑动事件
        slider.addEventListener('input', (e) => {
            const saturationValue = e.target.value;
            
            // 应用滤镜到杯子
            cup.style.filter = `saturate(${saturationValue}%)`;
            
            // 更新数值显示
            label.textContent = saturationValue;
        });
    </script>
</body>
</html>
