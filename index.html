<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Cup Colour EXP</title>
    <style>
        :root {
            --primary-color: #f1f1f1;
            --bg-dark: #101010;
            --accent-blue: #3F85FA;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #d1d1d1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 场景容器 */
        .scene-container {
            position: relative;
            width: 90vw;
            max-width: 1024px;
            aspect-ratio: 16 / 9; 
            margin-top: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border-radius: 12px;
            overflow: hidden;
            line-height: 0;
            font-size: 0;
        }

        /* 图层样式 */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            will-change: opacity;
        }

        .layer-high-sat {
            background-image: url('cup_high.png');
            z-index: 1;
        }

        .layer-low-sat {
            background-image: url('cup_low.png');
            z-index: 2;
            opacity: 1; 
        }

        /* 控制面板 */
        .controls-panel {
            margin-top: 40px;
            width: 90vw;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .label-text {
            font-size: 1.1em;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 0.5px;
            color: #b0b0b0;
            text-align: center;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .value-display {
            font-family: monospace;
            width: 60px;
            text-align: right;
            font-size: 1.2em;
            color: var(--primary-color);
            font-weight: bold;
        }

        /* 提交按钮 */
        #submitBtn {
            margin-top: 10px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--accent-blue);
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        #submitBtn:hover {
            background: #2b73e6;
            transform: translateY(-2px);
        }

        #submitBtn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        /* 成功提示 */
        #successToast {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 204, 0.9);
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="successToast">The data has been updated. Please continue with the test.</div>

    <div class="scene-container">
        <div class="layer layer-high-sat"></div>
        <div class="layer layer-low-sat" id="lowSatLayer"></div>
    </div>

    <div class="controls-panel">
        <label class="label-text" for="saturationSlider">Please use the slider to adjust the colour until it fits your preference.</label>
        
        <div class="slider-container">
            <span>Low</span>
            <input type="range" id="saturationSlider" min="0" max="100" value="0">
            <span>High</span>
            <span class="value-display"><span id="satValue">0</span>%</span>
        </div>

        <button id="submitBtn">Confirm selection</button>
    </div>

    <script>
        const lowSatLayer = document.getElementById('lowSatLayer');
        const saturationSlider = document.getElementById('saturationSlider');
        const satValueDisplay = document.getElementById('satValue');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('successToast');

        // 1. 监听滑块实时调节透明度
        saturationSlider.addEventListener('input', (e) => {
            const saturationPercent = e.target.value; 
            // 0% (Low) 时透明度为 1 (完全显示低饱和图)
            // 100% (High) 时透明度为 0 (完全露出高饱和图)
            const opacityValue = 1 - (saturationPercent / 100);
            lowSatLayer.style.opacity = opacityValue;
            satValueDisplay.textContent = saturationPercent;
        });

        // 2. 数据回传 Credamo 核心逻辑
        submitBtn.onclick = function() {
            // 将 0-100 转换为 0.000-1.000 格式
            const saturationVal = (saturationSlider.value / 100).toFixed(3);
            
            // 向父窗口发送数据
            window.parent.postMessage({
                type: 'saturation_update',
                saturation: saturationVal
            }, "*"); 

            // UI 交互反馈
            toast.style.display = "block";
            submitBtn.innerText = "Selected";
            submitBtn.style.background = "#555";
            submitBtn.disabled = true;
            saturationSlider.disabled = true; // 提交后锁定滑块
            
            setTimeout(() => { 
                toast.style.display = "none"; 
            }, 3000);
        };

        // 初始化
        lowSatLayer.style.opacity = 1;
    </script>
</body>
</html>
