<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Saturation Study</title>
    <style>
        :root {
            --current-hue: 0;
            --current-saturation: 50;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        /* 实验场景容器 */
        .scene-container {
            position: relative;
            width: 90vw;
            max-width: 1000px;
            margin-top: 20px;
            /* 关键：消除图片底部的微小空隙 */
            line-height: 0; 
            font-size: 0;
        }

        /* 基础图层统一样式 */
        .layer {
            width: 100%;
            height: auto;
            /* 关键：防止图片被视为文字导致行高偏移 */
            display: block; 
        }

        /* 1. 底层：背景 */
        .base-background {
            z-index: 1;
        }

        /* 2. 中层：动态颜色层 */
        .cup-color-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background-color: hsl(var(--current-hue), calc(var(--current-saturation) * 1%), 50%);
            /* 使用杯子图作为蒙版 */
            -webkit-mask-image: url('Cup_Me.png');
            -webkit-mask-size: 100% 100%;
            mask-image: url('Cup_Me.png');
            mask-size: 100% 100%;
        }

        /* 3. 顶层：灰度纹理 */
        .cup-texture-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            background-image: url('Cup_Me.png');
            background-size: 100% 100%;
            /* 混合模式保留写实阴影 */
            mix-blend-mode: multiply;
            pointer-events: none;
        }

        /* 控制面板 */
        .controls-panel {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .color-group { display: flex; gap: 15px; }
        .color-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; cursor: pointer;
        }
        .color-btn.active { border-color: white; transform: scale(1.1); }

        .slider-container { display: flex; align-items: center; gap: 10px; width: 300px; }
        input[type=range] { flex: 1; cursor: pointer; }
    </style>
</head>
<body>

    <div class="scene-container">
        <img src="Cafe_Me.png" class="layer base-background">
        
        <div class="cup-color-layer" id="cupColor"></div>
        
        <div class="cup-texture-layer"></div>
    </div>

    <div class="controls-panel">
        <div class="color-group">
            <div class="color-btn active" style="background-color: #ff4d4d;" data-hue="0"></div>
            <div class="color-btn" style="background-color: #ffa64d;" data-hue="30"></div>
            <div class="color-btn" style="background-color: #ffff4d;" data-hue="60"></div>
            <div class="color-btn" style="background-color: #4dff4d;" data-hue="120"></div>
            <div class="color-btn" style="background-color: #4d94ff;" data-hue="220"></div>
        </div>

        <div class="slider-container">
            <span>Saturation</span>
            <input type="range" id="satSlider" min="0" max="100" value="50">
            <span id="satVal">50%</span>
        </div>
    </div>

    <script>
        const slider = document.getElementById('satSlider');
        const valText = document.getElementById('satVal');
        const btns = document.querySelectorAll('.color-btn');

        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.active').classList.remove('active');
                btn.classList.add('active');
                document.documentElement.style.setProperty('--current-hue', btn.dataset.hue);
            });
        });

        slider.addEventListener('input', (e) => {
            valText.textContent = e.target.value + '%';
            document.documentElement.style.setProperty('--current-saturation', e.target.value);
        });
    </script>
</body>
</html>
