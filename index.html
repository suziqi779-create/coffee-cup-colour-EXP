<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Cup Colour EXP</title>
    <style>
        :root {
            --primary-color: #f1f1f1;
            --bg-dark: #101010;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #d1d1d1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 场景容器，锁定比例 */
        .scene-container {
            position: relative;
            width: 90vw;
            max-width: 1024px;
            /* 关键：利用 aspect-ratio 确保容器比例与图片一致 */
            aspect-ratio: 16 / 9; 
            margin-top: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border-radius: 12px;
            overflow: hidden;
            /* 消除图片下方的微小空隙 */
            line-height: 0;
            font-size: 0;
        }

        /* 基础图层样式 */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* 开启硬件加速，确保滑块拖动极其流畅 */
            will-change: opacity;
        }

        /* 1. 底层：高饱和度蓝色杯子场景 */
        .layer-high-sat {
            background-image: url('Cup_high.png');
            z-index: 1;
        }

        /* 2. 顶层：低饱和度蓝色杯子场景 */
        .layer-low-sat {
            background-image: url('Cup_low.png');
            z-index: 2;
            /* 初始状态：滑块在最左侧，完全显示低饱和度图 */
            opacity: 1; 
        }

        /* 控制面板样式 */
        .controls-panel {
            margin-top: 40px;
            width: 90vw;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .label-text {
            font-size: 1.1em;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 0.5px;
            color: #b0b0b0;
        }

        /* 饱和度滑块自定义 */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .value-display {
            font-mono: monospace;
            width: 60px;
            text-align: right;
            font-size: 1.2em;
            color: var(--primary-color);
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="scene-container">
        <div class="layer layer-high-sat"></div>
        
        <div class="layer layer-low-sat" id="lowSatLayer"></div>
    </div>

    <div class="controls-panel">
        <label class="label-text" for="saturationSlider">Please use the slider to adjust the colour to your preference.</label>
        
        <div class="slider-container">
            <span>低饱和度</span>
            <input type="range" id="saturationSlider" min="0" max="100" value="0">
            <span>高饱和度</span>
            <span class="value-display"><span id="satValue">0</span>%</span>
        </div>
    </div>

    <script>
        // 获取 DOM 元素
        const lowSatLayer = document.getElementById('lowSatLayer');
        const saturationSlider = document.getElementById('saturationSlider');
        const satValueDisplay = document.getElementById('satValue');

        // 监听滑块事件
        saturationSlider.addEventListener('input', (e) => {
            const saturationPercent = e.target.value; // 0 到 100

            // 核心逻辑：将 0-100 的饱和度值转换为 1-0 的透明度值
            // 当饱和度是 0% (Low)，透明度是 1 (完全显示 Low 图)
            // 当饱和度是 100% (High)，透明度是 0 (完全露出 High 图)
            const opacityValue = 1 - (saturationPercent / 100);

            // 应用透明度到顶层低饱和度图
            lowSatLayer.style.opacity = opacityValue;

            // 更新数值显示
            satValueDisplay.textContent = saturationPercent;
        });

        // 初始化渲染：滑块在 0，完全显示低饱和度图
        lowSatLayer.style.opacity = 1;
    </script>
</body>
</html>
