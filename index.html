<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Cup Saturation</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            position: relative;
            width: 90vw;
            max-width: 1000px;
            margin-top: 5vh;
            line-height: 0;
        }

        /* 基础样式：让两张图完全重合 */
        .layer {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 背景图层 */
        .background-layer {
            z-index: 1;
        }

        /* 咖啡杯图层 */
        .cup-layer {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            /* 关键：初始状态 */
            filter: saturate(100%);
            pointer-events: none; /* 让鼠标事件穿透，如果背景有点击交互的话 */
        }

        /* 控制条 */
        .controls {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            text-align: center;
        }

        input[type=range] {
            width: 250px;
            margin: 0 15px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Coffee_Me.png" class="layer background-layer" alt="Cafe Background">
        <img src="Coffee_Cup_Me.png" id="cup" class="layer cup-layer" alt="Coffee Cup">
    </div>

    <div class="controls">
        <span>灰度</span>
        <input type="range" id="sat-slider" min="0" max="300" value="100">
        <span>超饱和</span>
        <p>当前饱和度: <span id="val">100</span>%</p>
    </div>

    <script>
        const slider = document.getElementById('sat-slider');
        const cup = document.getElementById('cup');
        const valDisplay = document.getElementById('val');

        slider.addEventListener('input', (e) => {
            const v = e.target.value;
            cup.style.filter = `saturate(${v}%)`;
            valDisplay.textContent = v;
        });
    </script>
</body>
</html>
